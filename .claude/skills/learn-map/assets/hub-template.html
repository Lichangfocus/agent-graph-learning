<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>知识探险 · 总入口</title>
<style>
  :root {
    --night-1: #1a2140; --night-2: #253055;
    --gold: #ffd166; --good: #58c98b; --ink-soft: #a79fc4;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans SC", sans-serif;
    background: radial-gradient(120% 100% at 50% 0%, var(--night-2) 0%, var(--night-1) 70%);
    color: #f2ecdd; min-height: 100vh; -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 860px; margin: 0 auto; padding: 40px 20px 60px; }
  .tag { font-size: 12px; letter-spacing: 3px; color: var(--gold); text-transform: uppercase; }
  h1 { font-size: 32px; margin: 8px 0 10px; letter-spacing: 1px; }
  .about { font-size: 15px; line-height: 1.8; color: #cfc8e8; max-width: 40em; margin: 0 0 10px; }
  .total-pill {
    display: inline-flex; align-items: center; gap: 10px; margin: 14px 0 30px;
    background: rgba(255,255,255,.07); border-radius: 999px; padding: 10px 20px; font-size: 14px;
  }
  .total-track { width: 160px; height: 8px; border-radius: 4px; background: rgba(255,255,255,.15); overflow: hidden; }
  .total-fill { height: 100%; border-radius: 4px; background: var(--gold); transition: width .6s ease; }
  .chapters { display: flex; flex-direction: column; gap: 0; }
  .ch-row { display: flex; gap: 18px; }
  .rail { display: flex; flex-direction: column; align-items: center; width: 44px; flex: none; }
  .rail .dot {
    width: 44px; height: 44px; border-radius: 50%; display: grid; place-items: center; font-size: 20px;
    border: 3px solid #5d668f; background: var(--night-1); flex: none; z-index: 1;
  }
  .ch-row.done .rail .dot { border-color: var(--good); background: rgba(88,201,139,.15); }
  .ch-row.current .rail .dot { border-color: var(--gold); box-shadow: 0 0 18px rgba(255,209,102,.4); }
  .rail .line { width: 3px; flex: 1; background: #3d466f; min-height: 26px; }
  .ch-row:last-child .rail .line { background: transparent; }
  a.ch-card {
    flex: 1; display: block; text-decoration: none; color: inherit;
    background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.1);
    border-radius: 18px; padding: 18px 22px; margin-bottom: 26px;
    transition: border-color .2s ease, transform .2s ease;
  }
  a.ch-card:hover { border-color: var(--gold); transform: translateX(4px); }
  .ch-title { font-size: 19px; font-weight: 700; margin: 0 0 6px; }
  .ch-desc { font-size: 13.5px; line-height: 1.7; color: var(--ink-soft); margin: 0 0 12px; }
  .ch-meta { display: flex; align-items: center; gap: 12px; font-size: 12.5px; color: var(--ink-soft); }
  .ch-track { width: 120px; height: 7px; border-radius: 4px; background: rgba(255,255,255,.14); overflow: hidden; }
  .ch-fill { height: 100%; border-radius: 4px; background: var(--gold); }
  .ch-row.done .ch-fill { background: var(--good); }
  .ch-badge { margin-left: auto; font-size: 12px; color: var(--gold); }
  .foot { margin-top: 20px; font-size: 12.5px; color: #8b83ab; line-height: 1.8; }
  .foot a { color: #cbb2ff; }
  @media (max-width: 560px) { .ch-meta { flex-wrap: wrap; } }
</style>
</head>
<body>
<div class="wrap">
  <div class="tag" id="hub-tag"></div>
  <h1 id="hub-title"></h1>
  <p class="about" id="hub-about"></p>
  <div class="total-pill">
    <span>总进度 <b id="total-num">0</b>/<span id="total-max">0</span></span>
    <span class="total-track"><span class="total-fill" id="total-fill" style="width:0"></span></span>
  </div>
  <div class="chapters" id="chapters"></div>
  <p class="foot" id="hub-foot"></p>
</div>
<script>
// 生成器注入数据：把下一行的 HUB DATA 占位符（连同 null）整体替换为入口 JSON
const HUB = /*__HUB_DATA__*/null;
if (!HUB) { document.body.innerHTML = '<p style="padding:40px">HUB 数据未注入。</p>'; throw new Error('no data'); }

document.title = HUB.title;
document.getElementById('hub-tag').textContent = HUB.tag || '';
document.getElementById('hub-title').textContent = HUB.title;
document.getElementById('hub-about').textContent = HUB.about || '';
document.getElementById('hub-foot').innerHTML = HUB.foot || '';

function litCount(id) {
  try {
    const d = JSON.parse(localStorage.getItem('learnmap-' + id) || 'null');
    return d && Array.isArray(d.lit) ? d.lit.length : 0;
  } catch (e) { return 0; }
}

const box = document.getElementById('chapters');
let total = 0, done = 0, currentMarked = false;
let html = '';
const stats = HUB.chapters.map(ch => {
  const n = litCount(ch.id);
  total += ch.total; done += Math.min(n, ch.total);
  return { ...ch, n };
});
stats.forEach((ch, i) => {
  const finished = ch.n >= ch.total;
  const isCurrent = !finished && !currentMarked && (i === 0 || stats[i-1].n > 0 || true);
  const cls = finished ? 'done' : (!currentMarked ? 'current' : '');
  if (!finished && !currentMarked) currentMarked = true;
  html += `<div class="ch-row ${cls}">
    <div class="rail"><div class="dot">${finished ? '✓' : ch.icon}</div><div class="line"></div></div>
    <a class="ch-card" href="${ch.dir}/">
      <p class="ch-title">${ch.title}</p>
      <p class="ch-desc">${ch.desc}</p>
      <div class="ch-meta">
        <span>${ch.n}/${ch.total} 已点亮</span>
        <span class="ch-track"><span class="ch-fill" style="width:${ch.total ? ch.n / ch.total * 100 : 0}%"></span></span>
        <span class="ch-badge">${finished ? '本章完成 🎉' : (cls === 'current' ? '从这里继续 →' : '')}</span>
      </div>
    </a>
  </div>`;
});
box.innerHTML = html;
document.getElementById('total-num').textContent = done;
document.getElementById('total-max').textContent = total;
document.getElementById('total-fill').style.width = (total ? done / total * 100 : 0) + '%';
</script>
</body>
</html>
